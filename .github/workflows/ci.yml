name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Cross-platform manifest drift check
        # --check: 8 manifests + CHANGELOG top must agree.
        # --audit: a stray undeclared version string (a missed manifest) fails.
        run: |
          python scripts/bump_version.py --check
          python scripts/bump_version.py --audit
      - name: Run full test suite
        # Hermetic: geocode mocked. Covers schema, gates, e2e fixtures, README
        # freshness, version consistency, and the cross-platform manifest gates.
        run: python -m pytest -q
